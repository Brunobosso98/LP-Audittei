<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1726" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />

    <!-- SEO -->
    <title>Inttax — Inteligência Fiscal que Revoluciona seu Escritório Contábil</title>
    <meta
      name="description"
      content="Automatize a auditoria fiscal do seu escritório contábil com a Inttax. Reduza 85% do tempo em processos manuais, identifique anomalias com IA e garanta conformidade fiscal total."
    />
    <meta name="keywords" content="auditoria fiscal, inteligência fiscal, escritório contábil, automação fiscal, software contábil, NFSe, IA fiscal, compliance fiscal" />
    <meta name="author" content="Inttax" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://www.inttax.com.br/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Inttax" />
    <meta property="og:title" content="Inttax — Inteligência Fiscal que Revoluciona seu Escritório Contábil" />
    <meta
      property="og:description"
      content="Automatize a auditoria fiscal com IA. Reduza 85% do tempo em processos manuais e garanta conformidade fiscal total."
    />
    <meta property="og:url" content="https://www.inttax.com.br/" />
    <meta property="og:image" content="https://www.inttax.com.br/logo-dark.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Inttax — Inteligência Fiscal" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Inttax — Inteligência Fiscal" />
    <meta
      name="twitter:description"
      content="Automatize a auditoria fiscal com IA. Reduza 85% do tempo em processos manuais e garanta conformidade fiscal total."
    />
    <meta name="twitter:image" content="https://www.inttax.com.br/logo-dark.svg" />

    <!-- Performance: preconnect to Google Fonts antes do CSS bloquear -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <link rel="icon" type="image/svg+xml" href="/logo-dark.svg" />
    <link rel="apple-touch-icon" href="/logo-dark.svg" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Inttax",
        "url": "https://www.inttax.com.br",
        "logo": "https://www.inttax.com.br/logo-dark.svg",
        "description": "Inteligência Fiscal para Escritórios Contábeis",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Itapira",
          "addressRegion": "SP",
          "addressCountry": "BR"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+55-19-97818-0175",
          "contactType": "sales",
          "availableLanguage": "Portuguese"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
